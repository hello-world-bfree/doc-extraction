name: Validate Package

on:
  pull_request:
    paths:
      - 'pyproject.toml'
      - 'src/extraction/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Set up Python
      run: uv python install 3.13

    - name: Build package
      run: |
        uv build

    - name: Check package metadata
      run: |
        uv pip install twine
        uv run twine check dist/*

    - name: Test installation from wheel
      run: |
        uv pip install dist/*.whl

    - name: Verify CLI commands
      run: |
        extract --help
        vatican-extract --help
        token-rechunk --help
        extract-images --help

    - name: Test import
      run: |
        uv run python -c "from extraction.extractors import EpubExtractor; print('✓ Import successful')"
        uv run python -c "from extraction.analyzers import CatholicAnalyzer; print('✓ Analyzer import successful')"
        uv run python -c "from extraction.core.chunking import merge_paragraphs_by_hierarchy; print('✓ Core import successful')"

    - name: Check package size
      run: |
        echo "Package sizes:"
        ls -lh dist/

    - name: Upload package artifacts
      uses: actions/upload-artifact@v4
      with:
        name: package-dist
        path: dist/
